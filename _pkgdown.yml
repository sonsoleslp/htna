url: https://sonsoles.me/htna/

template:
  bootstrap: 5
  bootswatch: flatly
navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]

reference:
  - title: Build
    desc: Construct and inspect a heterogeneous transition network
    contents:
      - build_htna
      - summary.htna

  - title: Paths & Patterns
    desc: Discover meta-paths and state-level patterns
    contents:
      - extract_meta_paths
      - extract_paths
      - print.htna_paths

  - title: Plot
    desc: Visualise the network
    contents:
      - plot_htna
      - plot_htna_bootstrap
      - plot_htna_diff
      - sequence_plot_htna
      - plot_sequences

  - title: Centrality
    desc: Compute and visualise node-level centralities
    contents:
      - centralities
      - plot_centralities

  - title: Edge betweenness
    desc: Replace edge weights with shortest-path betweenness scores
    contents:
      - edge_betweenness_htna
      - plot_edge_betweenness_htna

  - title: Validation
    desc: Bootstrap, permutation, reliability, and stability checks
    contents:
      - bootstrap_htna
      - bootstrap
      - permutation
      - reliability_htna
      - centrality_stability_htna

articles:
  - title: Getting Started
    contents:
      - htna
      - data-preparation
      - input-formats
  - title: Advanced
    contents:
      - multigroup
      - grouped
