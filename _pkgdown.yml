url: https://sonsoles.me/htna/

template:
  bootstrap: 5
  bootswatch: flatly
navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]

reference:
  - title: Build
    desc: Construct and inspect a heterogeneous transition network
    contents:
      - build_htna
      - summary.htna

  - title: Frequencies and distributions
    desc: Marginal state-level summaries and chi-square mosaics
    contents:
      - frequencies_htna
      - plot_frequencies_htna
      - state_frequencies_htna
      - state_distribution_htna
      - mosaic_plot_htna

  - title: Sequences
    desc: Per-session trajectories and k-gram pattern comparison
    contents:
      - sequence_plot_htna
      - plot_sequences
      - sequence_compare_htna

  - title: Network plots
    desc: Visualise an htna network and contrasts between networks
    contents:
      - plot_htna
      - plot_htna_bootstrap
      - plot_htna_diff

  - title: Centrality
    desc: Compute and visualise node-level centralities
    contents:
      - centralities_htna
      - plot_centralities

  - title: Edge betweenness
    desc: Replace edge weights with shortest-path betweenness scores
    contents:
      - edge_betweenness_htna
      - plot_edge_betweenness_htna

  - title: Paths and patterns
    desc: Discover meta-paths, state-level patterns, and association rules
    contents:
      - extract_meta_paths
      - print.htna_paths
      - association_rules_htna

  - title: Model assessment
    desc: Reliability, stability, permutation, and Markov-order adequacy
    contents:
      - bootstrap_htna
      - bootstrap
      - permutation_htna
      - reliability_htna
      - casedrop_reliability_htna
      - centrality_stability_htna
      - markov_order_test_htna
  - title: Datasets
    desc: Sample dataset
    contents:
    - human_ai
articles:
  - title: Getting started
    contents:
      - htna
      - input-formats
      - grouped
  - title: Analysis
    contents:
      - frequencies-and-mosaic
      - sequence-plots
      - sequence-comparison
  - title: Advanced
    contents:
      - multigroup
      - markov-order
      - model-assessment
